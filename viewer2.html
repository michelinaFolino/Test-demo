<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Portale Demo</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .viewer {
      width: 100%;
      min-height: 100vh;
      background: #fff;
    }

    #slide {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

    .nav {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 1000;
      background: transparent;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background: #6f6f6f;   /* pieno, non trasparente */
      color: #fff;
      cursor: pointer;
      box-shadow: none;      /* niente alone */
      -webkit-appearance: none;
      appearance: none;
    }

    button:focus,
    button:active {
      outline: none;
      box-shadow: none;
    }
  </style>
</head>
<body>

  <div class="viewer">
    <img id="slide" alt="Demo Portale" />
  </div>

  <div class="nav">
    <button onclick="nextSlide()">Avanti</button>
  </div>

  <script>
    const base = "https://michelinafolino.github.io/Test-demo/";
    const slides = [
      "immagine1.png"
    ];

    let i = 0;
    const img = document.getElementById("slide");

    function show() {
      img.src = base + slides[i];
    }

    function nextSlide() {
      i = (i + 1) % slides.length;
      show();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    show();
  </script>

</body>
</html>
