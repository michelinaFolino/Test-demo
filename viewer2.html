<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Portale Demo</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: Arial, sans-serif;
    }

    #slide {
      position: fixed;
      top: -6vh;
      left: -8vw;
      width: 116vw;
      height: 112vh;
      object-fit: cover;
      display: block;
      background: #fff;
    }

    .nav {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 10;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: 0;
      border-radius: 10px;
      background: rgba(120, 120, 120, 0.9);
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <img id="slide" alt="Demo Portale" />

  <div class="nav">
    <button onclick="nextSlide()">Avanti</button>
  </div>

  <script>
    const base = "https://michelinafolino.github.io/Test-demo/";
    const slides = [
      "immagine1.png"
    ];

    let i = 0;
    const img = document.getElementById("slide");

    function show() {
      img.src = base + slides[i];
    }

    function nextSlide() {
      i = (i + 1) % slides.length;
      show();
    }

    show();
  </script>

</body>
</html>
