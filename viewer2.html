<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Portale Demo</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    .viewer {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    #slide {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .nav {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 10;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #8a8a8a;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="viewer">
    <img id="slide" alt="Demo Portale" />
  </div>

  <div class="nav">
    <button onclick="nextSlide()">Avanti</button>
  </div>

  <script>
    const base = "https://michelinafolino.github.io/Test-demo/";
    const slides = [
      "immagine1.png"
    ];

    let i = 0;
    const img = document.getElementById("slide");

    function show() {
      img.src = base + slides[i];
    }

    function nextSlide() {
      i = (i + 1) % slides.length;
      show();
    }

    show();
  </script>

</body>
</html>
